name: Renovate

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  issues:
    types: [edited]

permissions:
  contents: read

jobs:
  renovate:
    if: github.event_name != 'issues' || github.event.issue.title == 'Dependency Dashboard'
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RS_TOKEN_APP_ID }}
          private-key: ${{ secrets.RS_TOKEN_APP_PK }}

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM_COMMIT: enabled
        with:
          token: ${{ steps.app-token.outputs.token }}
